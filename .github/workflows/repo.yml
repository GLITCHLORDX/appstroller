name: Build Repo

on:
  workflow_dispatch:
  push:

permissions:
  contents: write

jobs:
  repo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt update
          sudo apt install dpkg-dev bzip2 gzip -y

      - name: Generate Packages
        run: |
          rm -f Packages Packages.gz Packages.bz2
          dpkg-scanpackages ./debs / > Packages
          sed -i 's/^Section: .*/Section: Tweaks/' Packages
          sed -i 's/^Architecture: .*/Architecture: iphoneos-arm/' Packages
          gzip -9 -k -f Packages
          bzip2 -9 -k -f Packages

      - name: Generate Release
        run: |
          rm -f Release
          echo "Origin: GLITCHLORDX Repo" >> Release
          echo "Label: GLITCHLORDX Repo" >> Release
          echo "Suite: stable" >> Release
          echo "Version: 1.0" >> Release
          echo "Codename: ios" >> Release
          echo "Architectures: iphoneos-arm" >> Release
          echo "Components: main" >> Release
          echo "Description: iOS tweaks repo" >> Release

      - name: Commit files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add Packages Packages.gz Packages.bz2 Release
          git commit -m "Update repo index" || echo "No changes"
          git pull --rebase origin main
          git push
